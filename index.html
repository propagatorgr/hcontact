<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <title>Σύστημα με ελατήριο και τριβή</title>

  https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.jsscript>
  sketch.js

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 20px;
    }
    #canvas-holder {
      margin: 0 auto;
    }
    #controls {
      margin-top: 15px;
      width: 900px;
      margin-left: auto;
      margin-right: auto;
    }
    .sliderBlock {
      margin: 8px 0;
    }
    label {
      display: inline-block;
      width: 80px;
      text-align: right;
      margin-right: 10px;
    }
    input[type=range] {
      width: 300px;
    }
  </style>
</head>

<body>

  <!-- ✅ ΤΟ CANVAS ΕΔΩ -->
  <div id="canvas-holder"></div>

  <!-- ✅ SLIDERS ΚΑΤΩ -->
  <div id="controls">
    <div class="sliderBlock">
      <label>m₁ (kg)</label>
      <input type="range" id="m1Slider" min="1" max="8" step="0.5" value="4">
      <span id="m1Val">4</span>
    </div>

    <div class="sliderBlock">
      <label>m₂ (kg)</label>
      <input type="range" id="m2Slider" min="1" max="8" step="0.5" value="2">
      <span id="m2Val">2</span>
    </div>

    <div class="sliderBlock">
      <label>k (N/m)</label>
      <input type="range" id="kSlider" min="100" max="500" step="10" value="200">
      <span id="kVal">200</span>
    </div>

    <div class="sliderBlock">
      <label>μ</label>
      <input type="range" id="muSlider" min="0.1" max="1.0" step="0.05" value="0.5">
      <span id="muVal">0.50</span>
    </div>
  </div>

</body>
</html>
