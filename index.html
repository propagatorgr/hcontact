<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Ταλάντωση με Τριβή</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { font-family: Arial; text-align: center; }
    #controls { margin-top: 10px; }
    label { display: block; margin-top: 8px; }
  </style>
</head>

<body>

<div id="sketch-holder"></div>

<div id="controls">
  <label>m₁: <span id="m1v"></span></label>
  <input type="range" id="m1" min="1" max="8" value="4">

  <label>m₂: <span id="m2v"></span></label>
  <input type="range" id="m2" min="1" max="8" value="2">

  <label>k: <span id="kv"></span></label>
  <input type="range" id="k" min="100" max="500" step="10" value="200">

  <p>
    ω = √(k / (m₁ + m₂))<br>
    x<sub>crit</sub> = μ g / ω², μ = 0.5
  </p>

  <button id="resume" disabled>RESUME</button>
</div>

<script src="sketch.js"></script>
</body>
</html>
