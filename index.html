<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <title>Ταλάντωση – Απώλεια επαφής – Ολίσθηση – Πτώση</title>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
  <script src="sketch.js" defer></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 20px;
    }
    #canvas-holder {
      margin: 0 auto;
    }
    #controls {
      width: 900px;
      margin: 15px auto;
    }
    .sliderBlock {
      margin: 8px 0;
    }
    label {
      display: inline-block;
      width: 160px;
      text-align: right;
      margin-right: 10px;
    }
    input[type="range"] {
      width: 300px;
    }
    button {
      margin: 10px;
      padding: 6px 16px;
      font-size: 14px;
    }
    .formula {
      font-family: "Courier New", monospace;
      font-size: 14px;
      margin: 4px 0;
    }
  </style>
</head>

<body>

  <div id="canvas-holder"></div>

  <div id="controls">

    <div class="sliderBlock">
      <label>m₁ (kg)</label>
      <input type="range" id="m1" min="1" max="8" step="0.5" value="4">
      <span id="m1v">4</span>
    </div>

    <div class="sliderBlock">
      <label>m₂ (kg)</label>
      <input type="range" id="m2" min="1" max="8" step="0.5" value="2">
      <span id="m2v">2</span>
    </div>

    <div class="sliderBlock">
      <label>k (N/m)</label>
      <input type="range" id="k" min="100" max="500" step="10" value="200">
      <span id="kv">200</span>
    </div>

    <div class="sliderBlock">
      <label>μ</label>
      <input type="range" id="mu" min="0.1" max="1.0" step="0.05" value="0.50">
      <span id="muv">0.50</span>
    </div>

    <hr>

    <div class="sliderBlock">
      <label>Ενέργεια E (J)</label>
      <input type="range" id="ESlider" min="0" max="20" step="0.2" value="0">
      <span id="Ev">0.0</span>
    </div>

    <!-- ΤΥΠΟΙ ΚΑΙ ΤΙΜΕΣ -->
    <div class="formula">A = √(2E / k)</div>
    <div class="formula">A = <span id="Av">0.000</span> m</div>

    <div class="formula">x<sub>crit</sub> = μg / ω²</div>
    <div class="formula">x<sub>crit</sub> = <span id="Xcv">0.000</span> m</div>

    <hr>

    <button id="startBtn">START</button>
    <button id="resumeBtn">RESUME</button>
    <button id="stopBtn">STOP</button>
    <button id="resetBtn">RESET</button>

  </div>

</body>
</html>
