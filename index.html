<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <title>Ταλάντωση – Απώλεια επαφής</title>

  <!-- p5.js -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.jsch -->
  <script src="skpt>

  <!-- MathJax (INLINE math μόνο) -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']]
      },
      options: {
        renderActions: { addMenu: [] }
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 16px;
      text-align: center;
    }

    #canvas-holder {
      max-width: 100%;
      margin: 0 auto 12px auto;
    }

    /* ---------- CONTROLS LAYOUT ---------- */
    #controls {
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sliderBlock {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    label {
      min-width: 140px;
      text-align: right;
    }

    input[type="range"] {
      width: 260px;
      max-width: 70vw;
    }

    hr {
      width: 100%;
      max-width: 600px;
      margin: 10px auto;
    }

    /* ---------- MATH LINES ---------- */
    .mathline {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 2px 0;
    }

    .formula mjx-container {
      font-size: 85% !important;
    }

    .value {
      font-size: 16px;
    }

    /* ---------- BUTTONS ---------- */
    .buttons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      padding: 6px 16px;
      font-size: 14px;
    }

    /* ---------- RESPONSIVE ---------- */
    @media (max-width: 600px) {
      label {
        min-width: unset;
        text-align: center;
      }

      .sliderBlock {
        flex-direction: column;
        gap: 4px;
      }

      input[type="range"] {
        width: 90vw;
      }

      .value {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

  <div id="canvas-holder"></div>

  <div id="controls">

    <!-- SLIDERS -->
    <div class="sliderBlock">
      <label>m₁ (kg)</label>
      <input type="range" id="m1" min="1" max="8" step="0.5" value="4">
      <span id="m1v">4</span>
    </div>

    <div class="sliderBlock">
      <label>m₂ (kg)</label>
      <input type="range" id="m2" min="1" max="8" step="0.5" value="2">
      <span id="m2v">2</span>
    </div>

    <div class="sliderBlock">
      <label>k (N/m)</label>
      <input type="range" id="k" min="100" max="500" step="10" value="200">
      <span id="kv">200</span>
    </div>

    <div class="sliderBlock">
      <label>μ</label>
      <input type="range" id="mu" min="0.1" max="1.0" step="0.05" value="0.50">
      <span id="muv">0.50</span>
    </div>

    <hr>

    <div class="sliderBlock">
      <label>Ενέργεια E (J)</label>
      <input type="range" id="ESlider" min="0" max="20" step="0.2" value="0">
      <span id="Ev">0.0</span>
    </div>

    <hr>

    <!-- MATH + VALUES (ΟΡΙΖΟΝΤΙΑ) -->
    <div class="mathline">
      <span class="formula">$A=\sqrt{\frac{2E}{k}}$</span>
      <span class="value">⇒ A = <span id="Av">0.000</span> m</span>
    </div>

    <div class="mathline">
      <span class="formula">$x_{\text{crit}}=\frac{\mu g}{\omega^2}$</span>
      <span class="value">⇒ x<sub>crit</sub> = <span id="Xcv">0.000</span> m</span>
    </div>

    <div class="mathline">
      <span class="formula">$\omega=\sqrt{\frac{k}{m_1+m_2}}$</span>
    </div>

    <hr>

    <!-- BUTTONS -->
    <div class="buttons">
      <button id="startBtn">START</button>
      <button id="resumeBtn">RESUME</button>
      <button id="stopBtn">STOP</button>
      <button id="resetBtn">RESET</button>
    </div>

  </div>

</body>
</html>
