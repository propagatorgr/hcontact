<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="utf-8">
  <title>Ταλάντωση – Απώλεια επαφής</title>

  <!-- p5.js -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>

  <!-- sketch -->
  <script src="sketch.js" defer></script>

  <!-- MathJax (INLINE μόνο) -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']]
      },
      options: {
        renderActions: { addMenu: [] }
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 20px;
    }

    #canvas-holder {
      margin: 0 auto;
    }

    #controls {
      width: 900px;
      margin: 15px auto;
    }

    .sliderBlock {
      margin: 6px 0;
    }

    label {
      display: inline-block;
      width: 160px;
      text-align: right;
      margin-right: 10px;
    }

    input[type="range"] {
      width: 300px;
    }

    button {
      margin: 10px;
      padding: 6px 16px;
      font-size: 14px;
    }

    .formula {
      font-size: 18px;
      margin: 4px 0;
    }

    .value {
      font-size: 16px;
      margin-bottom: 6px;
    }

    /* μικραίνει ΜΟΝΟ τους MathJax τύπους */
    .formula mjx-container {
      font-size: 85% !important;
    }
  </style>
</head>

<body>

  <div id="canvas-holder"></div>

  <div id="controls">

    <div class="sliderBlock">
      <label>m₁ (kg)</label>
      <input type="range" id="m1" min="1" max="8" step="0.5" value="4">
      <span id="m1v">4</span>
    </div>

    <div class="sliderBlock">
      <label>m₂ (kg)</label>
      <input type="range" id="m2" min="1" max="8" step="0.5" value="2">
      <span id="m2v">2</span>
    </div>

    <div class="sliderBlock">
      <label>k (N/m)</label>
      <input type="range" id="k" min="100" max="500" step="10" value="200">
      <span id="kv">200</span>
    </div>

    <div class="sliderBlock">
      <label>μ</label>
      <input type="range" id="mu" min="0.1" max="1.0" step="0.05" value="0.50">
      <span id="muv">0.50</span>
    </div>

    <hr>

    <div class="sliderBlock">
      <label>Ενέργεια E (J)</label>
      <input type="range" id="ESlider" min="0" max="20" step="0.2" value="0">
      <span id="Ev">0.0</span>
    </div>

    <hr>

    <!-- ΤΥΠΟΙ (INLINE, ΟΡΙΖΟΝΤΙΟΙ) -->
    <div class="formula">
      $A=\sqrt{\frac{2E}{k}}$
    </div>
    <div class="value">
      A = <span id="Av">0.000</span> m
    </div>

    <div class="formula">
      $x_{\text{crit}}=\frac{\mu g}{\omega^2}$
    </div>
    <div class="value">
      x<sub>crit</sub> = <span id="Xcv">0.000</span> m
    </div>

    <div class="formula">
      $\omega=\sqrt{\frac{k}{m_1+m_2}}$
    </div>

    <hr>

    <!-- ΚΟΥΜΠΙΑ -->
    <button id="startBtn">START</button>
    <button id="resumeBtn">RESUME</button>
    <button id="stopBtn">STOP</button>
    <button id="resetBtn">RESET</button>

  </div>

</body>
</html>
